name: Update Macro Data (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar dados macro (com fallback)
        run: |
          cp public/macro-data.json public/macro-data.json.bak
          python scripts/fetch_macro.py || true
          python - <<'EOF'
          import json
          with open('public/macro-data.json') as f:
              d = json.load(f)
          has = any(len(v) > 0 for v in d.get('series', {}).values())
          if not has:
              import shutil
              shutil.copy('public/macro-data.json.bak', 'public/macro-data.json')
              print('APIs falharam — usando dados do repositório como fallback.')
          else:
              print('Dados novos OK.')
          EOF

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
