<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Proteínas Brasil — Acompanhamento setorial</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="src/styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/data-utils.jsx"></script>
<script type="text/babel" src="src/upload.jsx"></script>
<script type="text/babel" src="src/seasonal-chart.jsx"></script>
<script type="text/babel" src="src/ciclo-boi.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
(async () => {
  let data = null, meta = null;
  try {
    const cached = localStorage.getItem('dashboard_data');
    const cachedMeta = localStorage.getItem('dashboard_meta');
    if (cached) { data = JSON.parse(cached); meta = cachedMeta ? JSON.parse(cachedMeta) : null; }
  } catch {}
  if (!data) {
    const resp = await fetch('public/data.json');
    data = await resp.json();
    meta = { source: 'planilha inicial', updated: null };
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<window.App initialData={data} initialMeta={meta}/>);
})();
</script>
</body>
</html>
